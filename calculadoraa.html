<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

        <link rel="stylesheet" href="estilo.css">

</head>
<body>

<table border="1">
    <tr>
        <td colspan="4">
            <input type="text" id="visao" disabled>
        </td>
    </tr>

    <tr>
        <td><button onclick="delall()">AC</button></td>
        <td><button onclick="plot('.')">PHP</button></td>
        <td><button onclick="calc()">=</button></td>
        <td><button onclick="operate('+')">+</button></td>
    </tr>

    <tr>
        <td><button onclick="plot(7)">7</button></td>
        <td><button onclick="plot(8)">8</button></td>
        <td><button onclick="plot(9)">9</button></td>
        <td><button onclick="operate('/')">÷</button></td>
    </tr>

    <tr>
        <td><button onclick="plot(4)">4</button></td>
        <td><button onclick="plot(5)">5</button></td>
        <td><button onclick="plot(6)">6</button></td>
        <td><button onclick="operate('*')">×</button></td>
    </tr>

    <tr>
        <td><button onclick="plot(1)">1</button></td>
        <td><button onclick="plot(2)">2</button></td>
        <td><button onclick="plot(3)">3</button></td>
        <td><button onclick="operate('-')">−</button></td>
    </tr>

    <tr>
        <td><button onclick="plot(0)">0</button></td>
        <td colspan="3"></td>
    </tr>
</table>


<script src="script.js"></script>
</body>
</html>
